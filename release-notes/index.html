r\" data-hovercard-url=\"\u002Fusers\u002FShaneBeee\u002Fhovercard\" data-octo-click=\"hovercard-link-click\" data-octo-dimensions=\"link_type:self\" href=\"\u002FShaneBeee\"\u003E\u003Cimg class=\"avatar avatar-user\" src=\"https:\u002F\u002Favatars.githubusercontent.com\u002Fu\u002F20008482?s=40&amp;v=4\" width=\"20\" height=\"20\" alt=\"@ShaneBeee\" \u002F\u003E\u003C\u002Fa\u003E\n    \u003Ca class=\"text-bold color-text-secondary\" data-hovercard-type=\"user\" data-hovercard-url=\"\u002Fusers\u002FShaneBeee\u002Fhovercard\" data-octo-click=\"hovercard-link-click\" data-octo-dimensions=\"link_type:self\" href=\"\u002FShaneBeee\"\u003EShaneBeee\u003C\u002Fa\u003E\n    released this\n    \u003Crelative-time datetime=\"2020-12-11T21:46:59Z\" class=\"no-wrap\"\u003EDec 11, 2020\u003C\u002Frelative-time\u003E\n      &middot;\n      \u003Ca href=\"\u002FSkriptLang\u002FSkript\u002Fcompare\u002F2.5.3...master\"\u003E\n      125 commits\u003C\u002Fa\u003E\n      to master\n      since this release\n\u003C\u002Fp\u003E\n\n    \u003C\u002Fdiv\u003E\n\n    \n\n  \u003Cdiv class=\"markdown-body\"\u003E\n    \u003Cp\u003EWhile Skript 2.5.2 brought some lovely new features, it also brought a couple big bugs along for the ride. Our goal with this update was to squash those pesky bugs and provide a more stable release.\u003Cbr\u003E\nThis may be a small update, but it’s going to take care of some things that needed some attention.\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Cstrong\u003EFIXED\u003C\u002Fstrong\u003E:\u003C\u002Fp\u003E\n\u003Cul\u003E\n\u003Cli\u003EFixed an issue with substring expression throwing errors (closes \u003Ca class=\"issue-link js-issue-link\" data-error-text=\"Failed to load title\" data-id=\"752864157\" data-permission-text=\"Title is private\" data-url=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3585\" data-hovercard-type=\"issue\" data-hovercard-url=\"\u002FSkriptLang\u002FSkript\u002Fissues\u002F3585\u002Fhovercard\" href=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3585\"\u003E#3585\u003C\u002Fa\u003E)\u003C\u002Fli\u003E\n\u003Cli\u003EFixed an issue with the offhand tool in the bucket event returning the main hand (closes \u003Ca class=\"issue-link js-issue-link\" data-error-text=\"Failed to load title\" data-id=\"752856480\" data-permission-text=\"Title is private\" data-url=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3584\" data-hovercard-type=\"issue\" data-hovercard-url=\"\u002FSkriptLang\u002FSkript\u002Fissues\u002F3584\u002Fhovercard\" href=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3584\"\u003E#3584\u003C\u002Fa\u003E)\u003C\u002Fli\u003E\n\u003Cli\u003EFixed an issue with getting the event-location in some events (closes \u003Ca class=\"issue-link js-issue-link\" data-error-text=\"Failed to load title\" data-id=\"760683676\" data-permission-text=\"Title is private\" data-url=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3622\" data-hovercard-type=\"issue\" data-hovercard-url=\"\u002FSkriptLang\u002FSkript\u002Fissues\u002F3622\u002Fhovercard\" href=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3622\"\u003E#3622\u003C\u002Fa\u003E)\u003C\u002Fli\u003E\n\u003Cli\u003EFixed an issue with local variables being reset after using the teleport effect (closes \u003Ca class=\"issue-link js-issue-link\" data-error-text=\"Failed to load title\" data-id=\"757095140\" data-permission-text=\"Title is private\" data-url=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3605\" data-hovercard-type=\"issue\" data-hovercard-url=\"\u002FSkriptLang\u002FSkript\u002Fissues\u002F3605\u002Fhovercard\" href=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3605\"\u003E#3605\u003C\u002Fa\u003E)\u003C\u002Fli\u003E\n\u003Cli\u003EFixed an issue with debug mode not being disabled after changing and reloading config (thanks \u003Ca class=\"user-mention\" data-hovercard-type=\"user\" data-hovercard-url=\"\u002Fusers\u002FTPGamesNL\u002Fhovercard\" data-octo-click=\"hovercard-link-click\" data-octo-dimensions=\"link_type:self\" href=\"https:\u002F\u002Fgithub.com\u002FTPGamesNL\"\u003E@TPGamesNL\u003C\u002Fa\u003E)\u003C\u002Fli\u003E\n\u003Cli\u003EFixed an issue with a change in an internal class which caused an addon or two to not load (closes \u003Ca class=\"issue-link js-issue-link\" data-error-text=\"Failed to load title\" data-id=\"761033624\" data-permission-text=\"Title is private\" data-url=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3624\" data-hovercard-type=\"issue\" data-hovercard-url=\"\u002FSkriptLang\u002FSkript\u002Fissues\u002F3624\u002Fhovercard\" href=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3624\"\u003E#3624\u003C\u002Fa\u003E)\u003C\u002Fli\u003E\n\u003Cli\u003EFixed an issue with the \u003Ccode\u003Eblocks within\u003C\u002Fcode\u003E expression returning a smaller cuboid than expected (closes \u003Ca class=\"issue-link js-issue-link\" data-error-text=\"Failed to load title\" data-id=\"758781864\" data-permission-text=\"Title is private\" data-url=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3615\" data-hovercard-type=\"issue\" data-hovercard-url=\"\u002FSkriptLang\u002FSkript\u002Fissues\u002F3615\u002Fhovercard\" href=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3615\"\u003E#3615\u003C\u002Fa\u003E)\u003C\u002Fli\u003E\n\u003Cli\u003EFixed an issue with the location function throwing an error when the world is missing, it'll now fall back to default main world of the server (closes \u003Ca class=\"issue-link js-issue-link\" data-error-text=\"Failed to load title\" data-id=\"755766012\" data-permission-text=\"Title is private\" data-url=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3597\" data-hovercard-type=\"issue\" data-hovercard-url=\"\u002FSkriptLang\u002FSkript\u002Fissues\u002F3597\u002Fhovercard\" href=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3597\"\u003E#3597\u003C\u002Fa\u003E, \u003Ca class=\"issue-link js-issue-link\" data-error-text=\"Failed to load title\" data-id=\"716948331\" data-permission-text=\"Title is private\" data-url=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3455\" data-hovercard-type=\"issue\" data-hovercard-url=\"\u002FSkriptLang\u002FSkript\u002Fissues\u002F3455\u002Fhovercard\" href=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F3455\"\u003E#3455\u003C\u002Fa\u003E, \u003Ca class=\"issue-link js-issue-link\" data-error-text=\"Failed to load title\" data-id=\"349885795\" data-permission-text=\"Title is private\" data-url=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F1465\" data-hovercard-type=\"issue\" data-hovercard-url=\"\u002FSkriptLang\u002FSkript\u002Fissues\u002F1465\u002Fhovercard\" href=\"https:\u002F\u002Fgithub.com\u002FSkriptLang\u002FSkript\u002Fissues\u002F1465\"\u003E#1465\u003C\u002Fa\u003E)\u003C\u002Fli\u003E\n\u003C\u002Ful\u003E\n\u003Cp\u003EDon’t worry, its not all serious, we did add a bunch of new stuff too\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Cstrong\u003EADDED\u003C\u002Fstrong\u003E:\u003C\u002Fp\u003E\n\u003Cul\u003E\n\u003Cli\u003EAdded support for XP drops in the block break event\u003C\u002Fli\u003E\n\u003Cli\u003EAdded \u003Ccode\u003Eentity portal\u003C\u002Fcode\u003E event which is called when an entity uses a portal\u003C\u002Fli\u003E\n\u003C\u002Ful\u003E\n\u003Cp\u003EOh, never mind, it was just the two.\u003C\u002Fp\u003E\n\u003Cp\u003EEnjoy!\u003C\u002Fp\u003E\n  \u003C\u002Fdiv\u003E\n\n\n  \u003Cdiv class=\"d-flex flex-column flex-md-row flex-justify-between flex-content-center mb-n4 mt-4 border-top js-comment reactions-with-gap\"\u003E\n
